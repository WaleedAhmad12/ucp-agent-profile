services:
  - type: static
    name: ucp-agent-profile
    rootDir: .
    routes:
      - type: rewrite
        source: /*
        destination: /ucp-agent-profile.json
    headers:
      - path: /*
        name: Content-Type
        value: application/json
      - path: /*
        name: Cache-Control
        value: public, max-age=60
